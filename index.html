<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Nexus | Character Finder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Fond Cyberpunk -->
    <div class="cyber-bg">
        <div class="scanlines"></div>
        <div class="grid-overlay"></div>
        <div class="floating-particles" id="particles"></div>
    </div>

    <!-- Conteneur principal -->
    <div class="main-container">
        <!-- En-tête -->
        <header class="header glass-card">
            <h1 class="neon-title">MANGA <span class="glitch">NEXUS</span></h1>
            <p class="subtitle">Explorez l'univers des personnages légendaires</p>
            <div class="search-container">
                <input type="text" id="characterInput" class="cyber-input" placeholder="Entrez un nom... (ex: Goku, Naruto)">
                <button onclick="searchCharacter()" class="neon-btn">
                    <span class="btn-text"><i class="fas fa-search"></i> RECHERCHER</span>
                    <span class="btn-glitch"></span>
                </button>
            </div>
        </header>

        <!-- Section de chargement -->
        <div id="loading" class="hidden loading-section">
            <div class="loading-content glass-card">
                <div class="spinner"></div>
                <p>Recherche de <span id="loadingCharacterName">...</span> en cours...</p>
                <div class="loading-bar">
                    <div class="loading-bar-fill"></div>
                </div>
            </div>
        </div>

        <!-- Section d'erreur -->
        <div id="error" class="hidden error-section glass-card">
            <i class="fas fa-exclamation-triangle error-icon"></i>
            <p id="errorMessage"></p>
            <button onclick="hideError()" class="neon-btn error-btn">
                <span class="btn-text">OK</span>
            </button>
        </div>

        <!-- Section de résultat -->
        <div id="result" class="hidden result-section">
            <!-- Image du personnage (centrée) -->
            <div class="character-image-container">
                <div class="image-wrapper">
                    <img id="characterImage" src="" alt="Personnage" class="character-image">
                    <div class="image-glow"></div>
                    <div class="image-border"></div>
                </div>
                <h2 id="characterName" class="character-name neon-title"></h2>
            </div>

            <!-- Containers scrollables -->
            <div class="scroll-containers">
                <!-- Container 1: Histoire -->
                <div class="info-container glass-card" data-container="history">
                    <div class="container-header">
                        <i class="fas fa-book container-icon"></i>
                        <h3>HISTOIRE</h3>
                    </div>
                    <div class="container-content">
                        <p id="characterHistory"></p>
                    </div>
                </div>

                <!-- Container 2: Pouvoirs -->
                <div class="info-container glass-card" data-container="abilities">
                    <div class="container-header">
                        <i class="fas fa-bolt container-icon"></i>
                        <h3>POUVOIRS & CAPACITÉS</h3>
                    </div>
                    <div class="container-content">
                        <div id="characterAbilities" class="abilities-grid"></div>
                    </div>
                </div>

                <!-- Container 3: Univers -->
                <div class="info-container glass-card" data-container="universe">
                    <div class="container-header">
                        <i class="fas fa-globe container-icon"></i>
                        <h3>UNIVERS</h3>
                    </div>
                    <div class="container-content">
                        <p id="characterUniverse"></p>
                    </div>
                </div>

                <!-- Container 4: Apparitions -->
                <div class="info-container glass-card" data-container="appearances">
                    <div class="container-header">
                        <i class="fas fa-film container-icon"></i>
                        <h3>APPARITIONS</h3>
                    </div>
                    <div class="container-content">
                        <div id="characterAppearances" class="appearances-list"></div>
                    </div>
                </div>

                <!-- Container 5: Anecdotes -->
                <div class="info-container glass-card" data-container="funfacts">
                    <div class="container-header">
                        <i class="fas fa-lightbulb container-icon"></i>
                        <h3>ANECDOTES</h3>
                    </div>
                    <div class="container-content">
                        <div id="characterFunFacts" class="funfacts-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bouton de retour en haut -->
    <button id="scrollToTop" class="scroll-to-top neon-btn">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
